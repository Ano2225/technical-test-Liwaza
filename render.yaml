services:
  - type: web
    name: ivoire-data-backend
    runtime: docker
    dockerfilePath: ./packages/mcp-server/Dockerfile
    dockerContext: ./packages/mcp-server
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRY_HOURS
        value: 24
      - key: ALLOWED_ORIGINS
        value: "*"
